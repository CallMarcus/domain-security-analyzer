<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Domain Security Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('index') }}">🛡️ Domain Security Analyzer</a>
    <nav>
      <a href="{{ url_for('index') }}">New run</a>
      <a href="{{ url_for('changes') }}">Changes</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>Local UI &middot; runs stored on this machine only</span>
  </footer>
</body>
</html>
